.btn{background:#ffd700;color:#111;border:none;padding:clamp(9px,1.4vw,18px) clamp(18px,2.7vw,32px);font-size:clamp(18px,2.8vw,32px);cursor:pointer;font-weight:700;margin:clamp(3px,0.5vw,7px);font-family:'Courier New',monospace;}
.btn:hover{background:#ffe94c;}
.btn.g{background:#69f0ae;color:#111;}
.btn.b{background:#82b1ff;color:#111;}
.btn.r{background:#ff5252;color:#fff;}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(4px,0.8vw,9px);max-width:min(222px,40vw);margin:8px auto;}
.card{aspect-ratio:1;border:2px solid #333;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,5vw,50px);background:#181830;transition:transform .12s;user-select:none;}
.card:hover:not(.matched){transform:scale(1.07);border-color:#ffd700;}
.card.flipped{background:#1a2040;border-color:#82b1ff;}
.card.matched{background:#1a3020;border-color:#69f0ae;cursor:default;}
.card.disabled{opacity:0.5;cursor:not-allowed;}
.tut-row{display:flex;align-items:center;gap:clamp(6px,1vw,12px);margin:clamp(3px,0.5vw,7px) 0;text-align:left;}
.tut-icon{font-size:clamp(14px,2vw,22px);width:clamp(20px,2.5vw,32px);flex-shrink:0;}
.tut-text{font-size:clamp(16px,2.2vw,24px);color:#ccc;line-height:1.6;}
.mg-title{color:#ffd700;font-size:clamp(20px,3.5vw,36px);font-weight:700;margin-bottom:8px;font-family:'Courier New',monospace;}
.mg-desc{color:#ffffff;font-size:clamp(16px,2.2vw,24px);line-height:1.8;margin-bottom:8px;font-family:'Courier New',monospace;}
.mg-sub{color:#aaa;font-size:clamp(14px,1.8vw,20px);font-family:'Courier New',monospace;}
.mg-hi{color:#ffd700;font-size:clamp(16px,2.2vw,24px);font-weight:700;}

    if(e.code==='KeyB'&&hasBag)toggleInv1();
  }
  else if(gs==='paused'&&e.code==='KeyP')togglePause();
  else if(gs==='inv'&&e.code==='KeyB')toggleInv1();

});

  const r=CV.getBoundingClientRect();

  const ty=(e.clientY-r.top)*(H/r.height);
  if(tx>=W-72&&tx<=W-28&&ty>=46&&ty<=66){ChoAudio.toggleMute();return;}
  // 일시정지 버튼 클릭 감지
  if(gs==='playing'&&tx>pauseBtnRect.x&&ty>pauseBtnRect.y&&tx<pauseBtnRect.x+pauseBtnRect.w&&ty<pauseBtnRect.y+pauseBtnRect.h){togglePause();return;}
  if(gs==='paused'&&tx>pauseBtnRect.x&&ty>pauseBtnRect.y&&tx<pauseBtnRect.x+pauseBtnRect.w&&ty<pauseBtnRect.y+pauseBtnRect.h){togglePause();return;}
  if(gs==='title'){showTutorial();return;}
  if(gs==='howto'){nextTut();return;}

  if(gs==='bird_play')doBirdHit();

  const r=CV.getBoundingClientRect();

    x:(t.clientX-r.left)*(W/r.width),
    y:(t.clientY-r.top)*(H/r.height)
  }));
}
function inBtn(btn,tx,ty){return tx>=btn.x&&tx<=btn.x+btn.w&&ty>=btn.y&&ty<=btn.y+btn.h;}
function updateMobileKeys(e){
  const pts=getTouches(e);
  mobileKeys.left =pts.some(p=>inBtn(MB.left, p.x,p.y));
  mobileKeys.right=pts.some(p=>inBtn(MB.right,p.x,p.y));
  const jumpNow=pts.some(p=>inBtn(MB.jump,p.x,p.y));
  if(jumpNow&&!mobileKeys.jump){doJump();}
  mobileKeys.jump=jumpNow;
}

  if(OV.style.display==='flex')return;
  e.preventDefault();
  const r=CV.getBoundingClientRect();
  const t0=e.changedTouches[0];
  const tx=(t0.clientX-r.left)*(W/r.width);
  const ty=(t0.clientY-r.top)*(H/r.height);
  if(gs==='title'){showTutorial();return;}
  if(gs==='howto'){nextTut();return;}
  // over/clear 상태에서 터치로 재시작 없음 (버튼으로만)
  if(gs==='bird_play'){doBirdHit();return;}
  if(gs==='playing'){
    // 일시정지 버튼
    if(inBtn(pauseBtnRect,tx,ty)){togglePause();return;}
    updateMobileKeys(e);

  }

// ── UPDATE ─────────────────────────────────────────────────
function update(){
  if(gs!=='playing')return;
  frame++;

  const curMaxSpd = gumSlowTimer>0 ? SPD*0.31 : SPD;
  const curMinSpd = gumSlowTimer>0 ? 0.38 : 1.2;
  if(keys['ArrowLeft']||keys['KeyA']||mobileKeys.left)PL.vx=Math.max(PL.vx-.7,-curMaxSpd*.45);
  else if(keys['ArrowRight']||keys['KeyD']||mobileKeys.right)PL.vx=Math.min(PL.vx+.5,curMaxSpd);
  else PL.vx*=.74;
  if(PL.vx>curMaxSpd)PL.vx=curMaxSpd;
  if(PL.vx<curMinSpd)PL.vx=curMinSpd;

  // 새 능력: 스페이스 홀드 → 낙하 느려짐 (글라이드)
  const glide=PL.birdAb&&!PL.ground&&(keys['ArrowUp']||keys['Space'])&&PL.vy>0&&PL.birdBoosts===0;
  PL.vy+=glide?GRAV*.22:GRAV;
  PL.x+=PL.vx;PL.y+=PL.vy;

  const fy=FL-PL.h;
  if(PL.y>=fy){PL.y=fy;PL.vy=0;PL.ground=true;PL.dj=false;PL.birdBoosts=0;}
  else PL.ground=false;
  if(PL.y<8)PL.y=8;

  cam=Math.max(0,Math.min(PL.x-W*.32,WORLD-W));
  PL.x=Math.max(cam+40,PL.x);

  if(PL.ground&&Math.abs(PL.vx)>.5){PL.wt++;if(PL.wt>6){PL.wt=0;PL.wf=(PL.wf+1)%4;}}
  if(PL.inv>0)PL.inv--;
  if(gumSlowTimer>0)gumSlowTimer--;

  // 꽃잎
  petals.forEach(p=>{p.wb+=.04;p.x+=p.vx+Math.sin(p.wb)*.3;p.y+=p.vy;if(p.x<-10)p.x=W+10;if(p.y>H+10){p.y=-10;p.x=Math.random()*W;}});

  // 치와와 친구
  if(chiwaFriend.active){
    const tx=PL.x-58;
    chiwaFriend.x+=(tx-chiwaFriend.x)*.14;
    chiwaFriend.wt++;if(chiwaFriend.wt>7){chiwaFriend.wt=0;chiwaFriend.wf=(chiwaFriend.wf+1)%4;}
  }

  // 개똥 충돌
  if(PL.inv===0){
    for(const p of poops){
      if(p.used)continue;
      const sx=p.x-cam;
      if(PL.x-cam+PL.w-8>sx&&PL.x-cam+8<sx+22&&PL.y+PL.h>FL-20){
        p.used=true;hearts=Math.max(0,hearts-1);PL.inv=90;ChoSFX.hit();
        score=Math.max(0,score-5);
        PL.catAb=false;PL.birdAb=false;PL.suit='none';PL.birdBoosts=0;
        popups.push({x:PL.x,y:PL.y,t:'-1 ❤️',c:'#ff4444',life:55});
        if(hearts<=0){gs='over';showPanel('over');}
      }
    }
  }
  // 껌 충돌 (할머니 미션 중)
  if(deliveryActive){
    for(const g of gums){
      if(g.used)continue;
      const sx=g.x-cam;
      if(PL.x-cam+PL.w-8>sx&&PL.x-cam+8<sx+20&&PL.y+PL.h>FL-16){
        g.used=true;gumSlowTimer=240;
        popups.push({x:PL.x,y:PL.y,t:'🍬 껌! 느려짐!',c:'#ff69b4',life:70});
      }
    }
  }
  // 간식
  for(const s of snacks){
    if(s.used)continue;
    const sx=s.x-cam;
    if(PL.x-cam+PL.w>sx+2&&PL.x-cam<sx+26&&PL.y+PL.h>FL-55){
      s.used=true;hearts=Math.min(5,hearts+1);score+=10;ChoSFX.item();
      popups.push({x:PL.x,y:PL.y,t:'+1 ❤️',c:'#ff88aa',life:55});
    }
  }
  // NPC 조우
  if(yardNPC&&!yardNPC.met&&PL.x>yardNPC.x-80){yardNPC.met=true;ChoSFX.npc();showYardIntro();}
  if(catNPC&&!catNPC.met&&PL.x>catNPC.x-80){catNPC.met=true;ChoSFX.npc();showCatIntro();}
  if(birdNPC&&!birdNPC.met&&PL.x>birdNPC.x-80){birdNPC.met=true;ChoSFX.npc();showBirdIntro();}
  if(chiwaNPC&&!chiwaNPC.met&&PL.x>chiwaNPC.x-80){chiwaNPC.met=true;ChoSFX.npc();showChiwaIntro();}
  if(gmaNPC&&!gmaNPC.met&&PL.x>gmaNPC.x-80){
    gmaNPC.met=true;gs='puzzle';OV.style.display='flex';
    PNL.innerHTML=`<h2>👵 할머니 심부름!</h2>
      <p>어이구 조백호야~<br>할머니가 다리가 아파서 그런데<br>저 멀리 집에 이 상자 좀 갖다줄 수 있겠니?<br><b style="color:#ffd700">30초</b> 안에 저 끝까지 달려줘!<br><span class="mg-desc" style="color:#ff69b4">🍬 껌을 밟으면 속도가 느려지니 조심하거라!</span></p>
      <button class="btn g" onclick="startDelivery()">알겠어요 할머니!</button>`;
  }

  // 배달 타이머
  if(deliveryActive){
    deliveryTimer--;
    if(deliveryTimer<=0){
      // 시간 초과: 하트 1 감소 후 재도전
      hearts=Math.max(0,hearts-1);
      if(hearts<=0){gs='over';showPanel('over');return;}
      PL.hasBox=false;deliveryActive=false;
      gs='paused';OV.style.display='flex';
      PNL.innerHTML=`<h2>⏰ 시간 초과!</h2>
        <p>아이고, 시간이 다 됐어요!<br>할머니한테 다시 받아가자...</p>
        <button class="btn" onclick="retryDelivery()">다시 도전!</button>`;
    }
    if(PL.x>deliveryDestX-60){
      deliveryActive=false;PL.hasBox=false;score+=50;
      // ch1 데이터 저장 (인벤토리 포함)
      try{localStorage.setItem('ch1_save',JSON.stringify({
        hadChiwa:chiwaFriend.active,
        dogType:dogType,
        catAbility:inventory.catAbility,
        catEquipped:PL.catAb&&!inventory.catAbility,
        birdAbility:inventory.birdAbility,
        birdEquipped:PL.birdAb&&!inventory.birdAbility,
        hasBag:hasBag,
        items:inventory.items,
        score:score
      }));}catch(e){}
      gs='clear';showPanel('clear');
    }
  }

  // 시간 경과 점수 없음 (고정 배점제)
  popups=popups.filter(p=>{p.life--;p.y-=.5;return p.life>0;});
}

window.startDelivery=()=>{
  PL.hasBox=true;deliveryActive=true;deliveryTimer=30*60;
  // 껌 배치 (gmaNPC.x+200 ~ deliveryDestX-100 사이 랜덤)
  gums=[];
  const gStart=gmaNPC.x+200, gEnd=deliveryDestX-100;
  for(let gx=gStart;gx<gEnd;gx+=120+Math.floor(Math.random()*180)){
    gums.push({x:gx+Math.floor(Math.random()*80-40),used:false});
  }
  gumSlowTimer=0;
  OV.style.display='none';gs='playing';
};
window.retryDelivery=()=>{
  PL.hasBox=true;deliveryActive=true;deliveryTimer=30*60;
  gums.forEach(g=>g.used=false);gumSlowTimer=0;
  PL.x=gmaNPC.x+20;cam=Math.max(0,PL.x-W*.32);
  OV.style.display='none';gs='playing';
};

const YARD_POOL=[
  {emoji:'🌻',label:'해바라기'},{emoji:'🐞',label:'무당벌레'},
  {emoji:'🦋',label:'나비'},{emoji:'🌰',label:'도토리'},
  {emoji:'🐛',label:'애벌레'},{emoji:'🍄',label:'버섯'},
  {emoji:'🐝',label:'꿀벌'},{emoji:'🌸',label:'벚꽃'},
  {emoji:'🪲',label:'풍뎅이'},{emoji:'🌿',label:'풀'},
];
const YARD_POS=[
  {ex:28,ey:42},{ex:88,ey:68},{ex:148,ey:32},{ex:196,ey:88},
  {ex:52,ey:108},{ex:120,ey:118},{ex:170,ey:58},{ex:220,ey:98},
  {ex:78,ey:138},{ex:200,ey:138},
];
let yardItems=[],yardCtx=null,yardFound=0,yardTarget=0,yardMistakes=0,yardTimerID=null,yardTimeLeft=20;
let yardPW=600,yardPH=375;
function initYardSize(){
  updateScale();
  const pnlW=document.querySelector('.pnl')?document.querySelector('.pnl').clientWidth:600;
  yardPW=Math.max(320,Math.floor(pnlW*0.96));
  yardPH=Math.floor(yardPW*0.6); // 5:3 비율
}

function showYardIntro(){
  gs='puzzle';OV.style.display='flex';
  const pool=[...YARD_POOL].sort(()=>Math.random()-.5).slice(0,5);
  const pos=[...YARD_POS].sort(()=>Math.random()-.5).slice(0,5);
  yardItems=pool.map((p,i)=>({...p,ex:pos[i].ex,ey:pos[i].ey,er:8,found:false}));
  yardFound=0;yardTarget=0;
  const labels=yardItems.map(p=>`<span style="background:#1a2010;border:1px solid #4a7030;padding:2px 6px;border-radius:3px;margin:2px;display:inline-block;" class="mg-sub">${p.emoji} ${p.label}</span>`).join('');
  PNL.innerHTML=`
    <div style="font-size:32px;margin-bottom:4px">🏡</div>
    <h2 style="color:#78C850">집 마당 탐험!</h2>
    <p class="mg-desc">마당에 숨어있는 것들을 순서대로 찾아봐!</p>
    <div style="margin-bottom:8px;line-height:1.8">${labels}</div>
    <p class="mg-hi">먼저 찾을 것: <b>${yardItems[0].emoji} ${yardItems[0].label}</b></p>
    <button class="btn g" onclick="startYardGame()">찾기 시작! 🔍</button>`;
}
window.startYardGame=()=>{
  gs='yard_game';initYardSize();
  yardFound=0;yardTarget=0;yardMistakes=0;yardTimeLeft=20;
  yardItems.forEach(p=>p.found=false);
  if(yardTimerID)clearInterval(yardTimerID);
  PNL.innerHTML=`<div class="mg-title">🔍 마당 숨은그림 찾기!</div>
    <p class="mg-desc">찾을 것: <b class="mg-hi" id="ytgt">${yardItems[0].emoji} ${yardItems[0].label}</b></p>
    <p class="mg-sub">찾은 것: <span id="yf">0</span>/5 &nbsp;|&nbsp; 실수: <span id="ym">0</span>/3 &nbsp;|&nbsp; ⏱ <b style="color:#ff5252" id="ytm">20</b>초</p>
    <div class="hg-wrap">
      <canvas id="ygc" width="${yardPW}" height="${yardPH}" style="border:2px solid #78C850;cursor:crosshair;display:block;margin:4px auto;width:100%;height:auto;aspect-ratio:${yardPW}/${yardPH};"></canvas>
    </div>`;
  setTimeout(()=>{
    const yc=document.getElementById('ygc');if(!yc)return;
    yardCtx=yc.getContext('2d');drawYardScene();
    yc.addEventListener('click',onYardClick);
    yc.addEventListener('touchstart',e=>{
      e.preventDefault();
      const r=yc.getBoundingClientRect();
      onYardClickXY((e.changedTouches[0].clientX-r.left)*(yardPW/r.width),(e.changedTouches[0].clientY-r.top)*(yardPH/r.height));
    },{passive:false});
    // 10초 타이머
    yardTimerID=setInterval(()=>{
      if(gs!=='yard_game'&&gs!=='puzzle'){clearInterval(yardTimerID);return;}
      yardTimeLeft--;
      const t=document.getElementById('ytm');if(t)t.textContent=yardTimeLeft;
      if(yardTimeLeft<=0){
        clearInterval(yardTimerID);
        PNL.innerHTML=`<div class="mg-title">⏰ 시간 초과!</div>
          <p class="mg-desc">20초 안에 못 찾았어요!</p>
          <button class="btn" onclick="window.startYardGame()">다시하기</button>`;
      }
    },1000);
  },50);
};
function onYardClick(e){
  const r=e.target.getBoundingClientRect();
  onYardClickXY((e.clientX-r.left)*(yardPW/r.width),(e.clientY-r.top)*(yardPH/r.height));
}
function onYardClickXY(tx,ty){
  if(yardTarget>=5)return;
  const cur=yardItems[yardTarget];
  const dx=tx-cur.ex*GS,dy=ty-cur.ey*GS;
  if(Math.sqrt(dx*dx+dy*dy)<(cur.er+28)*GS){
    cur.found=true;yardFound++;yardTarget++;
    drawYardScene();
    const yf=document.getElementById('yf');if(yf)yf.textContent=yardFound;
    if(yardTarget<5){const t=document.getElementById('ytgt');if(t)t.textContent=yardItems[yardTarget].emoji+' '+yardItems[yardTarget].label;}
    if(yardFound>=5){
      // 인벤토리에 아이템 추가
      hasBag=true;
      score+=25;
      setTimeout(()=>{
        ChoSFX.win();PNL.innerHTML=`<h2>🎉 다 찾았어요!</h2>
          <p>마당에서 5개를 모두 찾았어!<br>
          <b style="color:#69f0ae">🎒 가방을 얻었어요!</b><br>
          <small>B키로 인벤토리를 열 수 있어요!</small></p>
          <button class="btn g" onclick="resumePlay()">출발! 🐾</button>`;
      },400);
    }
  } else {
    yardMistakes++;
    const ym=document.getElementById('ym');if(ym)ym.textContent=yardMistakes;
    if(yardCtx){
      yardCtx.fillStyle='rgba(255,80,80,0.35)';
      yardCtx.beginPath();yardCtx.arc(tx,ty,14*GS,0,Math.PI*2);yardCtx.fill();
      setTimeout(drawYardScene,400);
    }
    if(yardMistakes>=3){
      clearInterval(yardTimerID);
      setTimeout(()=>{
        ChoSFX.fail();PNL.innerHTML=`<div class="mg-title">😅 3번 틀렸어요!</div>
          <p class="mg-desc">다시 찾아볼까요?</p>
          <button class="btn" onclick="window.startYardGame()">다시하기</button>`;
      },500);
    }
  }
}
function drawYardScene(){
  if(!yardCtx)return;
  const yc=yardCtx,W2=yardPW,H2=yardPH;
  const s=GS; // 스케일
  // 하늘
  yc.fillStyle='#A8D8F0';yc.fillRect(0,0,W2,50*s);
  // 잔디
  yc.fillStyle='#5AA038';yc.fillRect(0,50*s,W2,H2-50*s);
  yc.fillStyle='#6EC44A';yc.fillRect(0,50*s,W2,8*s);
  // 집 외벽
  yc.fillStyle='#F0E0B0';yc.fillRect(140*s,10*s,100*s,70*s);
  yc.fillStyle='#4A5A6A';yc.beginPath();yc.moveTo(132*s,10*s);yc.lineTo(190*s,-18*s);yc.lineTo(248*s,10*s);yc.closePath();yc.fill();
  yc.fillStyle='#9CC8E0';yc.fillRect(155*s,22*s,25*s,20*s);yc.fillRect(195*s,22*s,25*s,20*s);
  yc.strokeStyle='#888';yc.lineWidth=1;yc.strokeRect(155*s,22*s,25*s,20*s);yc.strokeRect(195*s,22*s,25*s,20*s);

// ── CHIHUAHUA MAZE (9×9, 1분 제한) ────────────────────────
// 미로는 매번 랜덤 생성 (Recursive Backtracker)
let MAZE=[];
function generateMaze(rows,cols){
  // rows,cols 반드시 홀수 (벽 포함 크기)
  const grid=Array.from({length:rows},()=>Array(cols).fill(1));
  function carve(r,c){
    const dirs=[[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-.5);
    for(const [dr,dc] of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>0&&nr<rows-1&&nc>0&&nc<cols-1&&grid[nr][nc]===1){
        grid[r+dr/2][c+dc/2]=0;
        grid[nr][nc]=0;
        carve(nr,nc);
      }
    }
  }
  grid[1][1]=0;
  carve(1,1);
  // 목적지 강제 개방
  grid[rows-2][cols-2]=0;
  grid[rows-3][cols-2]=0;
  grid[rows-2][cols-3]=0;
  return grid;
}

function drawHouseA(x,y,w,h){

  [[w*.1,h*.18],[w*.56,h*.18],[w*.1,h*.56],[w*.56,h*.56]].forEach(([ox,oy])=>{
    if(ox+ww<w-2){fillR(x+ox,y+oy,ww,wh,'#9CC8E6');fillR(x+ox,y+oy,ww,2,'#708090');fillR(x+ox,y+oy,2,wh,'#708090');}
  });

}
function drawHouseB(x,y,w,h){
  if(x>W+30||x+w<-30)return;
  for(let ry=0;ry<h;ry+=8)for(let rx=0;rx<w;rx+=16){
    const off=Math.floor(ry/8)%2?8:0;
    fillR(x+rx+off,y+ry,14,6,'#C87050');
    fillR(x,y+ry,w,2,'#A05030');
  }
  const ww=Math.max(14,w*.24),wh=Math.max(12,h*.2);
  [[w*.1,h*.14],[w*.56,h*.14],[w*.1,h*.52],[w*.56,h*.52]].forEach(([ox,oy])=>{
    fillR(x+ox-2,y+oy-2,ww+4,wh+4,'#FFF');fillR(x+ox,y+oy,ww,wh,'#9CC8E6');
    fillR(x+ox+ww/2-1,y+oy,2,wh,'#FFF');fillR(x+ox,y+oy+wh/2-1,ww,2,'#FFF');
  });
  fillR(x+w*.34,y+h*.62,w*.32,h*.38,'#5A3010');
  cx.fillStyle='#A03020';cx.beginPath();cx.moveTo(x-8,y);cx.lineTo(x+w/2,y-40);cx.lineTo(x+w+8,y);cx.closePath();cx.fill();
  fillR(x-8,y-4,w+16,6,'#802010');
}
function drawHouseC(x,y,w,h){
  if(x>W+30||x+w<-30)return;
  fillR(x,y,w,h,'#F8F6EC');
  const cols=3,rows=3;
  const ww=Math.max(10,Math.floor((w-20)/(cols+1))),wh=Math.max(10,Math.floor((h*.7-20)/(rows+1)));
  for(let ri=0;ri<rows;ri++)for(let ci=0;ci<cols;ci++){

    fillR(wx,wy,ww,wh,'#B8D8F0');fillR(wx,wy,ww,2,'#7090A0');fillR(wx,wy,2,wh,'#7090A0');
  }
  fillR(x+w*.38,y+h*.72,w*.24,h*.28,'#606878');
  fillR(x-4,y-12,w+8,14,'#606878');fillR(x,y-16,w,6,'#505868');
  for(let i=0;i<6;i++)fillR(x+4+i*(w/6),y-22,Math.floor(w/8),8,'#505868');
}

const LB_MAX = 20;

function loadLB(){
  try {
    const raw = localStorage.getItem(LB_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e){ return []; }
}
function saveLB(entries){
  try { localStorage.setItem(LB_KEY, JSON.stringify(entries)); } catch(e){}
}
function addLBEntry(name, pts){
  let entries = loadLB();
  const now = new Date();
  const dateStr = now.getFullYear()+'.'+(now.getMonth()+1).toString().padStart(2,'0')+'.'+now.getDate().toString().padStart(2,'0');
  entries.push({name: name||'익명', score: pts, date: dateStr});
  entries.sort((a,b)=>b.score-a.score);
  if(entries.length > LB_MAX) entries = entries.slice(0, LB_MAX);
  saveLB(entries);
  return entries;
}

window.showLeaderboard = function(){
  OV.style.display='flex';
  PNL.innerHTML=`<h2>🏆 점수 기록</h2><p style="color:#ffd700;font-size:14px">이번 점수: <b>${score}</b></p>
    <div style="margin:10px 0">
      <input id="lb_name" maxlength="10" placeholder="이름 입력 (최대 10자)"
        style="background:#1a1a30;border:2px solid #ffd700;color:#fff;padding:7px 10px;font-size:13px;font-family:Courier New;width:180px;text-align:center;">
    </div>
    <button class="btn g" onclick="submitLB()">기록 등록! 🐾</button>
    <button class="btn b" onclick="skipLB()">그냥 지나가기</button>
    <div id="lb_loading" style="color:#555;font-size:12px;margin-top:8px">불러오는 중...</div>`;
  const entries = loadLB();
  renderLBTable(entries, -1);
};

function renderLBTable(entries, highlightIdx){
  const lb = document.getElementById('lb_loading');
  if(!lb) return;
  if(entries.length===0){lb.innerHTML='<p style="color:#555;font-size:11px">아직 기록이 없어요!</p>';return;}
  let rows = '';
  entries.forEach((e,i)=>{
    const isCur = i===highlightIdx;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    rows += `<tr style="background:${isCur?'rgba(255,215,0,0.18)':''}">
      <td style="color:${isCur?'#ffd700':'#888'};padding:3px 6px;font-size:11px">${medal||('#'+(i+1))}</td>
      <td style="color:${isCur?'#fff':'#ccc'};padding:3px 6px;font-size:11px;max-width:90px;overflow:hidden">${e.name}</td>
      <td style="color:#ffd700;padding:3px 6px;font-size:12px;font-weight:bold">${e.score}</td>
      <td style="color:#555;padding:3px 6px;font-size:10px">${e.date}</td>
    </tr>`;
  });
  lb.innerHTML=`<table style="width:100%;border-collapse:collapse;margin-top:6px;border-top:1px solid #333">
    <tr><th style="color:#888;font-size:10px;padding:4px">순위</th><th style="color:#888;font-size:10px">이름</th><th style="color:#888;font-size:10px">점수</th><th style="color:#888;font-size:10px">날짜</th></tr>
    ${rows}
  </table>`;
}

window.submitLB = function(){
  const inp = document.getElementById('lb_name');
  const name = inp ? inp.value.trim() : '';
  const btn = document.querySelector('#pnl .btn.g');
  if(btn) btn.disabled = true;
  const entries = addLBEntry(name, score);
  const myIdx = entries.findIndex(e=>e.score===score && e.name===(name||'익명'));
  renderLBTable(entries, myIdx);
  PNL.querySelector('input') && (PNL.querySelector('input').style.display='none');
  // 버튼 교체
  const btnArea = PNL.querySelector('.btn.g');
  if(btnArea){ btnArea.textContent='✅ 등록됨!'; btnArea.disabled=true; }
  setTimeout(()=>{
    PNL.querySelector('.btn.b') && (PNL.querySelector('.btn.b').textContent='닫기');
  },300);
};

window.skipLB = function(){
  OV.style.display='flex';
  const entries = loadLB();
  let rows='';
  if(entries.length===0){
    PNL.innerHTML=`<h2>🏆 리더보드</h2><p style="color:#555">아직 기록이 없어요!</p><button class="btn g" onclick="initGame();startGame()">다시 하기!</button>`;
    return;
  }
  entries.forEach((e,i)=>{
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    rows+=`<tr><td style="color:#888;padding:3px 6px;font-size:11px">${medal||('#'+(i+1))}</td>
      <td style="color:#ccc;padding:3px 6px;font-size:11px">${e.name}</td>
      <td style="color:#ffd700;padding:3px 6px;font-size:12px;font-weight:bold">${e.score}</td>
      <td style="color:#555;padding:3px 6px;font-size:10px">${e.date}</td></tr>`;
  });
  PNL.innerHTML=`<h2>🏆 리더보드</h2>
    <table style="width:100%;border-collapse:collapse;margin-bottom:10px;border-top:1px solid #333">
      <tr><th style="color:#888;font-size:10px;padding:4px">순위</th><th style="color:#888;font-size:10px">이름</th><th style="color:#888;font-size:10px">점수</th><th style="color:#888;font-size:10px">날짜</th></tr>
      ${rows}
    </table>
    <button class="btn g" onclick="initGame();startGame()">다시 하기! 🐾</button>`;
};


function loop(){
  requestAnimationFrame(loop);
  cx.clearRect(0,0,W,H);
  frame++;
  if(gs==='title'){drawTitle();return;}
  if(gs==='inv'||gs==='howto'||gs==='paused'||gs==='puzzle'||gs==='chiwa_maze'||gs==='bird_play'||gs==='over'||gs==='clear'||gs==='leaderboard'){
    drawBG();drawPoops();drawSnacks();drawNPCs();drawChiwaFriend();drawPlayer();drawHUD();return;
  }
  update();
  drawBG();drawPoops();drawSnacks();drawNPCs();drawChiwaFriend();drawPlayer();drawHUD();
}
OV.style.display='none';gs='title';loop();
</script>
