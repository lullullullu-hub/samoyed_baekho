// ── STATE ────────────────────────────────────────
let gs='title',frame=0,cam=0,hearts=5,maxHearts=5,score=0;

let chiwaFromCh1=false,ch1CatAb=false,ch1BirdAb=false,ch1DogType='chiwa'; // 1장 데이터

// NPC들

// ── INPUT ────────────────────────────────────────
function updateButtonRects(){}  // GS 변경 시 훅 (버튼은 캔버스 내부 좌표)
const keys={};
const mobileKeys={left:false,right:false,jump:false};
let pauseBtnRect={x:W-60,y:6,w:52,h:36};
const MB={
  left:{x:14,y:H-80,w:64,h:60},
  right:{x:84,y:H-80,w:64,h:60},
  jump:{x:W-100,y:H-86,w:88,h:72},
};
function inBtn(btn,tx,ty){return tx>=btn.x&&tx<=btn.x+btn.w&&ty>=btn.y&&ty<=btn.y+btn.h;}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)&&e.preventDefault();
  if(gs==='title'&&(e.code==='Space'||e.code==='Enter'))showTutorial();
  else if(gs==='howto'&&(e.code==='Space'||e.code==='Enter'))nextTut();
  else if(gs==='playing'){
    if(e.code==='Space'||e.code==='ArrowUp')doJump();
    if(e.code==='KeyP')togglePause();
    if(e.code==='KeyB')toggleInv();
  }
  else if(gs==='paused'&&e.code==='KeyP')togglePause();
  else if(gs==='inv'&&e.code==='KeyB')toggleInv();
  else if(gs==='cross_game'&&e.code==='Space')doCrossHit();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

CV.addEventListener('click',e=>{
  const r=CV.getBoundingClientRect();
  const tx=(e.clientX-r.left)*(W/r.width);
  const ty=(e.clientY-r.top)*(H/r.height);
  if(tx>=W-72&&tx<=W-28&&ty>=46&&ty<=66){ChoAudio.toggleMute();return;}
  if(gs==='title'){showTutorial();return;}
  if(gs==='howto'){nextTut();return;}
  if(gs==='playing'){
    if(inBtn(pauseBtnRect,tx,ty)){togglePause();return;}
    if(tx>W*.35)doJump();
  }
  if(gs==='cross_game')doCrossHit();
});
CV.addEventListener('touchstart',e=>{
  // 오버레이 패널이 열려있으면 캔버스 터치 무시 (버튼 탭 허용)
  if(OV.style.display==='flex')return;
  e.preventDefault();
  const r=CV.getBoundingClientRect();
  const t0=e.changedTouches[0];
  const tx=(t0.clientX-r.left)*(W/r.width);
  const ty=(t0.clientY-r.top)*(H/r.height);
  if(gs==='title'){showTutorial();return;}
  if(gs==='howto'){nextTut();return;}
  if(gs==='cross_game'){doCrossHit();return;}
  if(gs==='playing'){
    if(inBtn(pauseBtnRect,tx,ty)){togglePause();return;}
    updateMobileKeys(e);
  }
},{passive:false});
CV.addEventListener('touchmove',e=>{if(OV.style.display==='flex')return;e.preventDefault();if(gs==='playing')updateMobileKeys(e);},{passive:false});
CV.addEventListener('touchend',e=>{
  e.preventDefault();
  if(gs==='playing'){
    const pts=getTouches(e);
    mobileKeys.left=pts.some(p=>inBtn(MB.left,p.x,p.y));
    mobileKeys.right=pts.some(p=>inBtn(MB.right,p.x,p.y));
    mobileKeys.jump=pts.some(p=>inBtn(MB.jump,p.x,p.y));
  }
},{passive:false});
function getTouches(e){
  const r=CV.getBoundingClientRect();
  return Array.from(e.touches).map(t=>({x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)}));
}
function updateMobileKeys(e){
  const pts=getTouches(e);
  mobileKeys.left=pts.some(p=>inBtn(MB.left,p.x,p.y));
  mobileKeys.right=pts.some(p=>inBtn(MB.right,p.x,p.y));
  const jn=pts.some(p=>inBtn(MB.jump,p.x,p.y));
  if(jn&&!mobileKeys.jump)doJump();
  mobileKeys.jump=jn;
}

function doJump(){
  if(PL.ground){PL.vy=JUMP_V;PL.ground=false;PL.dj=false;PL.birdBoosts=PL.birdAb?4:0;ChoSFX.jump();}
  else if(PL.birdAb&&PL.birdBoosts>0){PL.vy=Math.max(-13,PL.vy-3.5);PL.birdBoosts--;ChoSFX.jump();}
  else if(!PL.dj&&PL.catAb){PL.vy=JUMP_V*.78;PL.dj=true;ChoSFX.jump();}
}
function startGame(){initGame();gs='playing';OV.style.display='none';ChoBGM.play(2);}
function togglePause(){
  if(gs==='playing'){gs='paused';OV.style.display='flex';showPausePanel();ChoBGM.pause();}
  else if(gs==='paused'){gs='playing';OV.style.display='none';ChoBGM.resume();}
}
function toggleInv(){
  if(!hasBag)return;
  if(!invOpen){
    invOpen=true;
    if(gs==='playing'){gs='inv';showInvPanel();}
  } else {
    invOpen=false;
    if(gs==='inv'){gs='playing';OV.style.display='none';}
  }
}
// ── 2장 인벤토리 (1장과 동일한 4x6 그리드)
const INV_CATALOG2={
  catAbility:{icon:'😸',name:'고양이 능력',desc:'이중 점프 가능!',color:'#ff8a65'},
  birdAbility:{icon:'🐦',name:'새 능력',desc:'날기! 스페이스 연타로 더 높이!',color:'#42a5f5'},
  lifePotion:{icon:'🧪',name:'생명수',desc:'하트를 가득 채워요!',color:'#69f0ae'},
  shield:{icon:'🛡️',name:'무적 방패',desc:'3초간 무적 상태!',color:'#ffd700'},
};
function getInvSlots2(){
  const slots=[];
  if(inventory.catAbility)slots.push({key:'catAbility',...INV_CATALOG2.catAbility});
  if(inventory.birdAbility)slots.push({key:'birdAbility',...INV_CATALOG2.birdAbility});
  for(let i=0;i<inventory.lifePotion;i++)slots.push({key:'lifePotion_'+i,...INV_CATALOG2.lifePotion});
  for(let i=0;i<inventory.shield;i++)slots.push({key:'shield_'+i,...INV_CATALOG2.shield});
  inventory.items.forEach((it,i)=>slots.push({key:'item_'+i,icon:'📦',name:it,desc:'',color:'#aaa'}));
  return slots;
}
function showInvPanel(selKey){
  OV.style.display='flex';
  renderInvGrid2(selKey);
}
function renderInvGrid2(selectedKey){
  const slots=getInvSlots2();
  const TOTAL=24;
  let cells='';
  for(let i=0;i<TOTAL;i++){
    const s=slots[i];
    const sel=s&&s.key===selectedKey;
    const bc=sel?'#ffd700':(s?'#555':'#222');
    const bg=s?'#1a1a40':'#0a0a18';
    const ic=s?s.icon:'';
    const oc=s?(' onclick="_selKey2=\''+s.key+'\';renderInvGrid2(_selKey2)"'):'';    
    cells+='<div'+oc+' style="aspect-ratio:1;background:'+bg+';border:2px solid '+bc+
      ';border-radius:6px;display:flex;align-items:center;justify-content:center;'+
      'font-size:calc(min(6vw,28px));cursor:'+(s?'pointer':'default')+';'+
      (sel?'box-shadow:0 0 8px rgba(255,215,0,0.5);':'')+
      '">'+ic+'</div>';
  }
  const sel=selectedKey?slots.find(function(s){return s&&s.key===selectedKey;}):null;
  let detail='<div class="mg-sub" style="margin-top:20px;text-align:center">←<br>아이템 선택</div>';
  if(sel){
    detail='<div style="text-align:center;margin-bottom:8px;font-size:clamp(28px,5vw,40px)">'+sel.icon+'</div>'

  }

    +'<div style="flex-shrink:0">'
    +'<div class="mg-sub" style="margin-bottom:6px;text-align:center">🎒 인벤토리</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;width:min(44vw,260px)">'
    +cells+'</div></div>'
    +'<div style="flex:1;min-width:0;padding-top:20px">'+detail+'</div>'
    +'</div>'
    +'<button class="btn" style="margin-top:10px;display:block;width:100%" onclick="toggleInv()">닫기 (B)</button>';
}
let _selKey2='';window.selectInvItem2=function(key){_selKey2=key;renderInvGrid2(key);};
window.useInvItem2=function(key){
  if(key==='catAbility'){

// ── UPDATE ───────────────────────────────────────
function update(){
  if(gs!=='playing')return;

  // 이동
  const curMax=manholeSlowTimer>0?SPD*0.4:SPD;
  const curMin=manholeSlowTimer>0?0.3:1.2;
  if(keys['ArrowLeft']||keys['KeyA']||mobileKeys.left)PL.vx=Math.max(PL.vx-.7,-curMax*.45);
  else if(keys['ArrowRight']||keys['KeyD']||mobileKeys.right)PL.vx=Math.min(PL.vx+.9,curMax);
  else PL.vx*=.74;
  if(PL.vx>curMax)PL.vx=curMax;
  if(PL.vx<curMin)PL.vx=curMin;

  PL.vy+=GRAV;PL.x+=PL.vx;PL.y+=PL.vy;
  const fy=FL-PL.h;
  if(PL.y>=fy){PL.y=fy;PL.vy=0;PL.ground=true;PL.dj=false;}
  else PL.ground=false;
  if(PL.y<8)PL.y=8;
  cam=Math.max(0,Math.min(PL.x-W*.32,WORLD-W));
  PL.x=Math.max(cam+40,PL.x);

  if(PL.ground&&Math.abs(PL.vx)>.5){PL.wt++;if(PL.wt>6){PL.wt=0;PL.wf=(PL.wf+1)%4;}}
  if(PL.inv>0)PL.inv--;
  if(manholeSlowTimer>0)manholeSlowTimer--;
  if(invincibleTimer>0){invincibleTimer--;if(invincibleTimer===0)hasInvincible=false;}

  // 치와와 따라오기
  if(chiwaFriend.active){
    const tx=PL.x-60;
    chiwaFriend.x+=(tx-chiwaFriend.x)*.14;
    chiwaFriend.wt++;if(chiwaFriend.wt>7){chiwaFriend.wt=0;chiwaFriend.wf=(chiwaFriend.wf+1)%4;}
  }

  // 맨홀 충돌
  if(PL.inv===0&&!hasInvincible){
    for(const m of manholes){
      if(m.used)continue;
      const sx=m.x-cam;
      if(PL.x-cam+PL.w-8>sx+2&&PL.x-cam+8<sx+26&&PL.y+PL.h>FL-16){
        m.used=true;hearts=Math.max(0,hearts-1);PL.inv=80;ChoSFX.hit();
        manholeSlowTimer=60;
        // 장착 능력 해제
        if(PL.catAb||PL.birdAb){
          PL.catAb=false;PL.birdAb=false;PL.suit='none';
          popups.push({x:PL.x,y:PL.y,t:'-1 ❤️ 능력 해제!',c:'#ff5252',life:70});
        } else {
          popups.push({x:PL.x,y:PL.y,t:'-1 ❤️ 맨홀!',c:'#ff5252',life:60});
        }
        if(hearts<=0){gs='over';showPanel('over');}
      }
    }
  }

  // 간식
  for(const s of snacks){
    if(s.used)continue;
    const sx=s.x-cam;
    if(PL.x-cam+PL.w>sx+2&&PL.x-cam<sx+28&&PL.y+PL.h>FL-55){
      s.used=true;hearts=Math.min(maxHearts,hearts+1);score+=10;ChoSFX.item();
      popups.push({x:PL.x,y:PL.y,t:'+1 ❤️',c:'#ff88aa',life:55});
    }
  }

  // NPC 조우
  if(crossNPC&&!crossNPC.met&&PL.x>crossNPC.x-80){crossNPC.met=true;ChoSFX.npc();showCrossIntro();}
  if(cafeNPC&&!cafeNPC.met&&PL.x>cafeNPC.x-80){cafeNPC.met=true;ChoSFX.npc();showCafeIntro();}
  // 집 미션 체크
  if(!houseMissionDone){
    for(const h of houseNPCs){
      if(!h.met&&PL.x>h.x-100){h.met=true;ChoSFX.npc();showHouseIntro(h);break;}
    }
  }

  // 택시 씬
  if(taxiScene&&!taxiScene.active&&!taxiScene.done&&PL.x>taxiScene.x){
    taxiScene.active=true;showTaxiPanel();
  }

  popups=popups.filter(p=>{p.life--;p.y-=.5;return p.life>0;});
}

const CR={CW:192,CH:160,LANES:3,CELL:52,ROAD_X:12};
const CR_ROAD_END=CR.ROAD_X+CR.LANES*CR.CELL;
let crState={
  px:6,py:80,col:0,
  moving:false,targetX:0,
  cars:[],
  light:'red',lightTimer:0,
  alive:true,done:false,hit:false,success:false,
};
let crCtx=null,crLoop=null,crLives=3;

function sprOnCtx(ctx,data,sx,sy){
  data.forEach((row,ry)=>[...row].forEach((c,rx)=>{
    if(!PAL[c])return;
    ctx.fillStyle=PAL[c];ctx.fillRect(sx+rx*PS,sy+ry*PS,PS,PS);
  }));
}
function getColX(col){
  if(col<=0)return 6;
  if(col>CR.LANES)return CR_ROAD_END+6;
  return CR.ROAD_X+col*CR.CELL;
}

function showCrossIntro(){
  gs='puzzle';OV.style.display='flex';
  PNL.innerHTML=`
    <div style="font-size:clamp(28px,6vw,48px);margin-bottom:6px">🚦</div>

    <div style="background:#1a1a30;border:1px solid #ff5252;padding:12px;margin-bottom:12px;text-align:left;line-height:2">
      <span class="mg-desc">"앗, 큰 도로다! 차들이 엄청 많아!"</span><br>
      <span class="mg-desc">"탭/클릭/스페이스로 한 칸씩 오른쪽으로!"</span><br>
      <span class="mg-hi">"🔴 빨간불엔 못 건너! 차도 조심해! 🚗"</span>
    </div>
    <div class="btn-row"><button class="btn g" onclick="startCrossGame()">건너기 시작! 🚶</button>
    <button class="btn b" onclick="skipPuzzle()">그냥 지나가기</button></div>`;
}
window.startCrossGame=()=>{
  gs='cross_game';
  if(crLoop)clearInterval(crLoop);
  crLives=3;
  crState={px:6,py:CR.CH/2,col:0,moving:false,targetX:6,
    cars:[],light:'red',lightTimer:0,alive:true,done:false,hit:false,success:false};
  for(let lane=0;lane<CR.LANES;lane++){
    const dir=lane%2===0?1:-1;
    const spd=1.2+Math.random()*1.4;
    const laneX=CR.ROAD_X+lane*CR.CELL+CR.CELL/2-9;
    const gap=60+Math.floor(Math.random()*35);
    for(let i=0;i<3;i++){
      crState.cars.push({
        lane,x:laneX,
        y:dir>0?-44-i*gap:CR.CH+i*gap,
        vy:dir*spd,w:18,h:34,
      });
    }
  }
  PNL.innerHTML=`<h2>🚦 길 건너기!</h2>
    <p>탭 / 스페이스로 한 칸씩 오른쪽으로!<br>🔴 빨간불엔 못 건너! 기회 3번!</p>
    <canvas id="crc" width="${CR.CW}" height="${CR.CH}" style="display:block;margin:4px auto;border:2px solid #ff5252;cursor:pointer;width:min(480px,88vw);height:auto;aspect-ratio:${CR.CW}/${CR.CH};image-rendering:pixelated"></canvas>
    <div id="cr_msg" class="mg-sub" style="min-height:16px;margin:4px 0"></div>
    <button class="btn b" onclick="skipPuzzle()">그냥 지나가기</button>`;
  setTimeout(()=>{
    const cc=document.getElementById('crc');if(!cc)return;
    crCtx=cc.getContext('2d');crCtx.imageSmoothingEnabled=false;
    cc.addEventListener('click',doCrossStep);
    cc.addEventListener('touchstart',e=>{e.preventDefault();doCrossStep();},{passive:false});
    const crKeyH=e=>{
      if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();if(gs==='cross_game')doCrossStep();}
    };
    document.addEventListener('keydown',crKeyH);
    crLoop=setInterval(()=>{
      if(gs!=='cross_game'){clearInterval(crLoop);document.removeEventListener('keydown',crKeyH);return;}
      updateCross();drawCross();
    },16);
  },60);
};
function doCrossStep(){
  if(!crState.alive||crState.moving||crState.done)return;
  if(crState.light==='red'){
    const msg=document.getElementById('cr_msg');
    if(msg){msg.style.color='#ff5252';msg.textContent='🔴 빨간불! 초록불을 기다려!';}
    setTimeout(()=>{const m=document.getElementById('cr_msg');if(m)m.textContent='';},700);
    return;
  }
  const nextCol=crState.col+1;
  if(nextCol>CR.LANES+1){crState.done=true;crState.success=true;return;}
  crState.moving=true;crState.col=nextCol;
  crState.targetX=getColX(nextCol);
}
function doCrossHit(){doCrossStep();}
function updateCross(){
  if(!crState.alive)return;
  if(crState.moving){
    const dx=crState.targetX-crState.px;
    crState.px+=dx>0?Math.min(4,dx):0;
    if(crState.px>=crState.targetX){crState.px=crState.targetX;crState.moving=false;
      if(crState.col>CR.LANES){crState.done=true;crState.success=true;}
    }
  }
  crState.lightTimer++;
  const period=crState.light==='red'?130:90;
  if(crState.lightTimer>=period){crState.light=crState.light==='red'?'green':'red';crState.lightTimer=0;}
  crState.cars.forEach(car=>{
    if(crState.light!=='green'){
      car.y+=car.vy;
      if(car.y>CR.CH+50)car.y=-50;
      if(car.y<-50)car.y=CR.CH+50;
    }
    const cx2=car.x+car.w/2,cy2=car.y+car.h/2;
    if(Math.abs(cx2-crState.px)<car.w/2+12&&Math.abs(cy2-crState.py)<car.h/2+14){
      crState.alive=false;crState.hit=true;
    }
  });
  if(crState.done&&crState.success){
    clearInterval(crLoop);gs='puzzle';
    inventory.shield++;score+=25;
    ChoSFX.win();PNL.innerHTML=`<h2>🎉 건너기 성공!</h2>
      <p>완벽하게 건넜어요! 🦺<br>
      <b style="color:#69f0ae">🛡️ 무적 방패가 인벤에 저장됐어요!</b><br>
      <small>인벤(B)에서 꺼내 쓰세요!</small></p>
      <button class="btn g" onclick="resumePlay()">달려! 🐾</button>`;
  }
  if(!crState.alive&&crState.hit){
    crState.hit=false;crLives--;
    setTimeout(()=>{
      if(gs!=='cross_game')return;
      if(crLives<=0){
        clearInterval(crLoop);gs='puzzle';
        ChoSFX.fail();PNL.innerHTML=`<h2>😿 횡단보도 실패!</h2>
          <p>기회를 모두 썼어요.<br>신호 잘 보고 건너야 해!</p>
          <div class="btn-row"><button class="btn" onclick="startCrossGame()">다시 도전!</button>
          <button class="btn b" onclick="skipPuzzle()">그냥 가기</button></div>`;
      } else {
        crState.alive=true;crState.hit=false;
        crState.px=6;crState.col=0;crState.moving=false;crState.targetX=6;
      }
    },700);
  }
}
function drawCross(){
  if(!crCtx)return;
  const c=crCtx;
  // 왼쪽 인도 (출발)
  c.fillStyle='#a0a0a0';c.fillRect(0,0,CR.ROAD_X,CR.CH);
  // 오른쪽 인도 (도착)
  c.fillStyle='#a0a0a0';c.fillRect(CR_ROAD_END,0,CR.CW-CR_ROAD_END,CR.CH);
  // 도로
  c.fillStyle='#484848';c.fillRect(CR.ROAD_X,0,CR.LANES*CR.CELL,CR.CH);
  // 차선 경계선 (세로 점선)
  for(let i=0;i<=CR.LANES;i++){
    const lx=CR.ROAD_X+i*CR.CELL;
    for(let dy=0;dy<CR.CH;dy+=12){
      c.fillStyle='rgba(255,255,255,0.2)';
      c.fillRect(lx-1,dy,2,7);
    }
  }
  // 횡단보도 세로 줄무늬 (가운데 구간만, 3배 두꺼움)
  const cwY1=CR.CH/2-32,cwY2=CR.CH/2+32;
  const stripeW=15,stripeGap=8;
  for(let sx=CR.ROAD_X+3;sx<CR_ROAD_END-3;sx+=stripeW+stripeGap){
    c.fillStyle='rgba(255,255,255,0.6)';
    c.fillRect(sx,cwY1,stripeW,cwY2-cwY1);
  }
  // 신호 오버레이
  c.fillStyle=crState.light==='green'?'rgba(50,255,50,0.08)':'rgba(255,50,50,0.05)';
  c.fillRect(CR.ROAD_X,cwY1,CR.LANES*CR.CELL,cwY2-cwY1);
  // 보행자 신호등 (오른쪽 인도 위, 세로형)
  const ltX=CR_ROAD_END+4,ltY=CR.CH/2-22;
  // 기둥
  c.fillStyle='#555';c.fillRect(ltX+5,ltY+38,4,CR.CH/2-16);
  // 신호등 박스
  c.fillStyle='#111';c.fillRect(ltX,ltY,14,38);
  c.strokeStyle='#444';c.lineWidth=1;c.strokeRect(ltX,ltY,14,38);
  // 빨간불 (멈춤 사람 실루엣)
  c.fillStyle=crState.light==='red'?'#FF2020':'#331010';
  c.fillRect(ltX+3,ltY+3,8,14);
  if(crState.light==='red'){
    c.fillStyle='#FF6060';
    c.fillRect(ltX+5,ltY+4,4,3);
    c.fillRect(ltX+4,ltY+7,6,4);
    c.fillRect(ltX+5,ltY+11,2,4);
    c.fillRect(ltX+8,ltY+11,2,4);
  }
  // 초록불 (걷는 사람 실루엣)
  c.fillStyle=crState.light==='green'?'#20FF20':'#103310';
  c.fillRect(ltX+3,ltY+20,8,14);
  if(crState.light==='green'){
    c.fillStyle='#60FF60';
    c.fillRect(ltX+5,ltY+21,4,3);
    c.fillRect(ltX+4,ltY+24,6,4);
    c.fillRect(ltX+4,ltY+28,2,4);
    c.fillRect(ltX+8,ltY+28,2,4);
  }
  // 차들
  crState.cars.forEach(car=>{
    c.fillStyle='#e53935';c.fillRect(car.x,car.y,car.w,car.h);
    c.fillStyle='#b71c1c';c.fillRect(car.x+3,car.y,car.w-6,3);
    c.fillStyle='#fff';c.fillRect(car.x+2,car.y+2,5,7);
    c.fillRect(car.x+2,car.y+car.h-9,5,7);
    c.fillStyle='#ffd700';
    c.fillRect(car.x+5,car.vy>0?car.y+car.h-3:car.y,7,3);
  });
  // 도착지 줄
  c.fillStyle='#69f0ae';c.fillRect(CR_ROAD_END,cwY1,3,cwY2-cwY1);
  // 플레이어 (픽셀 스프라이트)
  if(crState.alive){
    sprOnCtx(c,D_RUN1,crState.px-18,crState.py-21);
  } else {
    sprOnCtx(c,D_JMP,crState.px-18,crState.py-21);
    c.fillStyle='rgba(255,80,80,0.5)';c.beginPath();c.arc(crState.px,crState.py-28,8,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';c.font='bold 11px Courier New';c.textAlign='center';c.fillText('!',crState.px,crState.py-24);
  }
  // 기회 표시
  c.fillStyle='rgba(0,0,0,0.55)';c.fillRect(0,CR.CH-16,CR.CW,16);
  c.fillStyle='#ff5252';c.font='bold 8px Courier New';c.textAlign='left';
  c.fillText('기회:'+'♥'.repeat(Math.max(0,crLives))+'♡'.repeat(Math.max(0,3-crLives)),3,CR.CH-5);
  c.fillStyle='#aaa';c.font='7px Courier New';c.textAlign='right';
  c.fillText('탭/스페이스→',CR.CW-3,CR.CH-5);
}

window.startTaxiMini=()=>{
  if(taxiMini.loop)clearInterval(taxiMini.loop);
  taxiMini.tx=320;taxiMini.phase='running';taxiMini.waving=false;taxiMini.waveTimer=0;
  taxiMini.isEmpty=Math.random()<0.6; // 60% 확률로 빈택시
  const CW=300,CH=160;
  PNL.innerHTML=`<h2>🚕 택시 잡기! (${taxiMini.chances-taxiMini.used}번 남음)</h2>
    <p>노란 구역에 택시가 오면 탭 / 스페이스!</p>
    <canvas id="txc" width="${CW}" height="${CH}" style="display:block;margin:4px auto;border:2px solid #ffd700;cursor:pointer;width:min(480px,88vw);height:auto;aspect-ratio:${CW}/${CH};image-rendering:pixelated"></canvas>
    <div id="tx_msg" class="mg-sub" style="min-height:16px;margin:4px 0"></div>
    <button class="btn b" onclick="skipPuzzle()">포기하기</button>`;
  setTimeout(()=>{
    const tc=document.getElementById('txc');if(!tc)return;
    taxiMini.ctx=tc.getContext('2d');
    // 입력 핸들러
    const onWave=()=>{
      if(taxiMini.phase!=='running')return;
      const inZone=taxiMini.tx>=taxiMini.catchZoneX&&taxiMini.tx<=taxiMini.catchZoneX+taxiMini.catchZoneW;
      if(inZone&&taxiMini.isEmpty){
        // 빈택시 성공!
        taxiMini.caught=true;taxiMini.phase='success';taxiMini.waving=true;
        clearInterval(taxiMini.loop);
        document.removeEventListener('keydown',kh);
        drawTaxiMini(CW,CH);
        setTimeout(()=>{
          taxiScene.done=true;
          localStorage.setItem('ch2_save',JSON.stringify({score,hearts,maxHearts,hadChiwa:chiwaFriend.active,dogType:ch1DogType,catAbility:inventory.catAbility,catEquipped:PL.catAb&&!inventory.catAbility,birdAbility:inventory.birdAbility,birdEquipped:PL.birdAb&&!inventory.birdAbility,lifePotion:inventory.lifePotion,shield:inventory.shield,items:inventory.items}));
          gs='clear';showPanel('clear');
        },1500);
      } else if(inZone&&!taxiMini.isEmpty){
        // 일반택시 구역 - 손님 있음, 기회 차감
        taxiMini.used++;
        const msg=document.getElementById('tx_msg');
        if(msg){msg.style.color='#ff8a65';msg.textContent='🔴 손님 있는 택시! (남은 기회: '+(taxiMini.chances-taxiMini.used)+'번)';}
        setTimeout(()=>{const m=document.getElementById('tx_msg');if(m)m.textContent='';},800);
        if(taxiMini.used>=taxiMini.chances){
          clearInterval(taxiMini.loop);document.removeEventListener('keydown',kh);
          taxiMini.phase='fail';
          ChoSFX.fail();PNL.innerHTML='<h2>😿 택시를 못 잡았어요!</h2><p>3번 다 놓쳤어요...<br><span style="color:#ff5252">2장 실패</span></p><button class="btn" onclick="initGame();startGame()">다시 도전!</button>';
        }
      } else {
        // 구역 밖 - 카운트 없음, 메시지만
        const msg=document.getElementById('tx_msg');
        if(msg){msg.style.color='#ff5252';msg.textContent='⛔ 아직 구역 밖이에요!';}
        setTimeout(()=>{const m=document.getElementById('tx_msg');if(m)m.textContent='';},500);
      }
    };
    tc.addEventListener('click',onWave);
    tc.addEventListener('touchstart',e=>{e.preventDefault();onWave();},{passive:false});
    const kh=e=>{if((e.code==='Space'||e.code==='ArrowUp')&&gs==='puzzle'){e.preventDefault();onWave();}};
    document.addEventListener('keydown',kh);

    taxiMini.loop=setInterval(()=>{
      if(gs!=='puzzle'){clearInterval(taxiMini.loop);document.removeEventListener('keydown',kh);return;}
      if(taxiMini.phase==='running'){
        taxiMini.tx-=taxiMini.speed;
        if(taxiMini.waveTimer>0)taxiMini.waveTimer--;
        // 택시가 구역 지나침 - 기회 차감 없이 그냥 새 택시
        if(taxiMini.tx<-80){
          taxiMini.tx=320;
          taxiMini.isEmpty=Math.random()<0.6;
          const h=document.querySelector('#pnl h2');
          if(h)h.textContent=`🚕 택시 잡기! (${taxiMini.chances-taxiMini.used}번 남음)`;
        }
      }
      drawTaxiMini(CW,CH);
    },16);
  },60);
};
window.startTaxiScene=window.startTaxiMini;  // 하위 호환

function drawTaxiMini(CW,CH){
  const c=taxiMini.ctx;if(!c)return;
  // 배경
  c.fillStyle='#383838';c.fillRect(0,0,CW,CH);
  // 인도
  c.fillStyle='#a0a0a0';c.fillRect(0,0,CW,50);
  c.fillStyle='#888';c.fillRect(0,48,CW,4);
  // 도로
  c.fillStyle='#484848';c.fillRect(0,52,CW,CH-52);
  // 차선
  for(let i=0;i<8;i++){c.fillStyle='rgba(255,215,0,0.5)';c.fillRect(i*42,CH/2+20,28,5);}
  // 잡기 존 강조 (노란 구역)
  const cz=taxiMini.catchZoneX,czw=taxiMini.catchZoneW;
  c.fillStyle='rgba(255,215,0,0.25)';c.fillRect(cz,52,czw,CH-52);
  c.strokeStyle='#ffd700';c.lineWidth=2;c.setLineDash([6,4]);
  c.strokeRect(cz,52,czw,CH-52);c.setLineDash([]);
  c.fillStyle='rgba(255,215,0,0.9)';c.font='bold 9px Courier New';c.textAlign='center';
  c.fillText('잡기 구역',cz+czw/2,66);
  // 택시
  const tx=taxiMini.tx,ty=CH-60;
  if(tx>-80&&tx<CW+80){
    // 택시 몸통
    c.fillStyle=taxiMini.caught?'#FFD700':'#FFD700';c.fillRect(tx,ty,70,28);
    c.fillStyle='#CC9900';c.fillRect(tx+5,ty,60,8);
    // 창문
    c.fillStyle='#aaddff';c.fillRect(tx+8,ty+8,18,12);c.fillRect(tx+34,ty+8,18,12);
    // 바퀴
    c.fillStyle='#222';c.beginPath();c.arc(tx+14,ty+28,7,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(tx+56,ty+28,7,0,Math.PI*2);c.fill();
    // 상단 등 (빈택시=초록, 손님있음=빨강)
    c.fillStyle='#222';c.fillRect(tx+18,ty-16,34,14);
    c.fillStyle=taxiMini.isEmpty?'#00CC44':'#CC2020';
    c.fillRect(tx+20,ty-14,30,10);
    c.fillStyle='#fff';c.font='bold 7px Courier New';c.textAlign='center';
    c.fillText(taxiMini.isEmpty?'빈 차':'손님 있',tx+35,ty-6);
    if(taxiMini.caught){
      c.fillStyle='#ffd700';c.font='bold 12px Courier New';c.textAlign='center';
      c.fillText('🎉',tx+35,ty-24);
    }
  }
  // 조백호 픽셀 그리기 (인도에서 기다림)
  const wave=taxiMini.waving||taxiMini.caught;
  const bx=16,by=4;  // 기준점
  // 꼬리
  c.fillStyle='#F2F0E8';

const LB_KEY='chobaekho_ch2_lb';
function loadLB(){try{const r=localStorage.getItem(LB_KEY);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveLB(e){try{localStorage.setItem(LB_KEY,JSON.stringify(e));}catch(e){}}
function addLBEntry(name,pts){
  let e=loadLB();
  const now=new Date();
  const d=now.getFullYear()+'.'+(now.getMonth()+1).toString().padStart(2,'0')+'.'+now.getDate().toString().padStart(2,'0');
  e.push({name:name||'익명',score:pts,date:d});
  e.sort((a,b)=>b.score-a.score);if(e.length>20)e=e.slice(0,20);saveLB(e);return e;
}
window.showLeaderboard=()=>{
  OV.style.display='flex';
  const entries=loadLB();
  PNL.innerHTML=`<h2>🏆 점수 기록 (2장)</h2>
    <p style="color:#ffd700">이번 점수: <b>${score}</b></p>
    <div style="margin:8px 0">
      <input id="lb_name" maxlength="10" placeholder="이름 입력 (최대 10자)"
        style="background:#1a1a30;border:2px solid #ffd700;color:#fff;padding:clamp(6px,1vw,10px) clamp(10px,1.5vw,16px);font-size:clamp(14px,2vw,20px);font-family:Courier New;width:min(280px,70vw);text-align:center;">
    </div>
    <div class="btn-row"><button class="btn g" onclick="submitLB()">기록 등록! 🐾</button>
    <button class="btn b" onclick="skipLB()">그냥 보기</button></div>
    <div id="lb_list" style="margin-top:8px">${renderLBRows(entries,-1)}</div>`;
};
function renderLBRows(entries,hi){
  if(!entries.length)return'<p class="mg-sub">아직 기록이 없어요!</p>';
  return`<table style="width:100%;border-collapse:collapse;border-top:1px solid #333">
    <tr>${['순위','이름','점수','날짜'].map(h=>`<th style="color:#888;font-size:clamp(12px,1.8vw,18px);padding:4px">${h}</th>`).join('')}</tr>
    ${entries.map((e,i)=>`<tr style="background:${i===hi?'rgba(255,215,0,0.15)':''}">
      <td style="color:#888;font-size:clamp(12px,1.8vw,18px);padding:4px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</td>
      <td style="color:${i===hi?'#fff':'#ccc'};font-size:clamp(12px,1.8vw,18px);padding:4px">${e.name}</td>
      <td style="color:#ffd700;font-size:clamp(13px,2vw,20px);font-weight:bold;padding:4px">${e.score}</td>
      <td style="color:#555;font-size:clamp(11px,1.6vw,16px);padding:4px">${e.date}</td>

  </table>`;
}
window.submitLB=()=>{
  const inp=document.getElementById('lb_name');
  const name=inp?inp.value.trim():'';
  const entries=addLBEntry(name,score);
  const myIdx=entries.findIndex(e=>e.score===score&&e.name===(name||'익명'));
  const lb=document.getElementById('lb_list');if(lb)lb.innerHTML=renderLBRows(entries,myIdx);
  const btn=document.querySelector('.btn.g');if(btn){btn.textContent='✅ 등록됨!';btn.disabled=true;}
};
window.skipLB=()=>{
  const entries=loadLB();
  PNL.innerHTML=`<h2>🏆 리더보드 (2장)</h2>${renderLBRows(entries,-1)}

function drawSky(){

  const grd=cx.createLinearGradient(0,0,0,H*.6);
  grd.addColorStop(0,'#8898C0');grd.addColorStop(.5,'#A0B0D0');grd.addColorStop(1,'#B8C8E0');
  cx.fillStyle=grd;cx.fillRect(0,0,W,H);
}

function drawBuilding(x,y,w,h,style,seed){
  if(x>W+30||x+w<-30)return;
  const walls=['#3A4858','#404858','#383C50','#3C4460','#445060','#384040','#3A3C58'];
  const trims=['#2A3848','#303848','#282C40','#2C3450','#344050','#283030','#2A2C48'];
  const accents=['#5080A0','#4A7080','#506090','#485880','#607890'];
  const wc=walls[style%7],tc=trims[style%7],ac=accents[style%5];
  // 빌딩 형태 다양화 (style에 따라)
  if(style%5===0){
    // 계단식 빌딩
    fillR(x,y,w,h,wc);
    fillR(x+Math.floor(w*.15),y-Math.floor(h*.15),Math.floor(w*.7),Math.floor(h*.15),wc);
    fillR(x+Math.floor(w*.3),y-Math.floor(h*.3),Math.floor(w*.4),Math.floor(h*.15),wc);
  } else if(style%5===1){
    // 유리 커튼월 빌딩
    fillR(x,y,w,h,'#2A3850');
    for(let ri=0;ri<Math.floor(h/12);ri++){
      fillR(x+2,y+ri*12,w-4,9,'#3A5068');
    }
    fillR(x,y,4,h,ac);fillR(x+w-4,y,4,h,ac);
  } else if(style%5===2){
    // 줄무늬 빌딩
    fillR(x,y,w,h,wc);
    for(let ri=0;ri<Math.floor(h/16);ri++){
      fillR(x,y+ri*16,w,4,tc);
    }
  } else {
    fillR(x,y,w,h,wc);
  }
  // 창문 그리드
  const cols=Math.max(2,Math.floor(w/18));
  const rows=Math.max(2,Math.floor(h/20));
  const ww=Math.max(8,Math.floor((w-10)/(cols+1)));
  const wh=Math.max(8,Math.floor((h*.75-10)/(rows+1)));
  for(let ri=0;ri<rows;ri++){
    for(let ci=0;ci<cols;ci++){
      const wx=x+6+ci*(ww+5);const wy=y+8+ri*(wh+6);
      // 불빛 완전 고정 (정수 해시만 사용, 절대 변하지 않음)
      const s2=seed!==undefined?seed:Math.round(x);
      const hash=(s2*31+ri*17+ci*7+style*3)&0xFFFF;
      const lit=(hash%10)<4;  // 40% 켜짐
      const winCol=style%5===1?'#5888A8':(lit?'#C8BC60':'#181E2C');
      fillR(wx,wy,ww,wh,winCol);
    }
  }
  // 옥상 (다양한 형태)
  fillR(x-3,y-8,w+6,10,tc);
  if(style%3===0)fillR(x+w/2-4,y-18,8,12,ac); // 안테나
  if(style%4===1)fillR(x+w/2-10,y-12,20,6,ac); // 물탱크 느낌
}

function drawBG(){

  cx.fillStyle='rgba(200,210,220,0.7)';
  [[100,40,38],[350,28,30],[600,44,34],[760,32,26]].forEach(([bx,by,br])=>{
    const wx=((bx-frame*.15)%(W+100)+W+100)%W;
    cx.beginPath();cx.arc(wx,by,br,0,Math.PI*2);
    cx.arc(wx+br*.6,by-br*.2,br*.65,0,Math.PI*2);
    cx.arc(wx-br*.55,by+br*.1,br*.55,0,Math.PI*2);
    cx.fill();if(wx+br*2>W){
      cx.beginPath();cx.arc(wx-W,by,br,0,Math.PI*2);
      cx.arc(wx-W+br*.6,by-br*.2,br*.65,0,Math.PI*2);cx.fill();

  });

  // 원거리 빌딩 (패럴랙스 0.2)
  buildings.far.forEach(b=>{
    const sx=b.wx-cam*.2;
    if(sx>W+30||sx+b.bw<-30)return;

  // 중거리 빌딩 (패럴랙스 0.55)

    if(sx>W+30||sx+b.bw<-30)return;
    drawBuilding(sx,280-b.bh,b.bw,b.bh,b.style,b.wx);

function drawPlayer(){

  const blink=PL.inv>0&&Math.floor(PL.inv/7)%2===1;

  if(shining){cx.fillStyle='rgba(255,215,0,0.3)';cx.beginPath();cx.arc(ppx+18,ppy+21,28,0,Math.PI*2);cx.fill();}

  cx.globalAlpha*=0.28;cx.fillStyle='#000';
  cx.beginPath();cx.ellipse(ppx+18,FL+4,16,5,0,0,Math.PI*2);cx.fill();
  cx.globalAlpha=blink?0.35:1;

  // 꼬리
  const tw=PL.ground&&Math.abs(PL.vx)>.5?Math.sin(PL.wf*Math.PI/2)*2:0;
  [[-PS,9*PS],[-PS,8*PS],[-2*PS,7*PS],[-2*PS,6*PS],[-3*PS,5*PS+tw],[-2*PS,4*PS],[-PS,3*PS],[0,2*PS]].forEach(([dx,dy])=>{
    cx.fillStyle='#F2F0E8';cx.fillRect(ppx+dx,ppy+dy,PS,PS);
  });

  cx.globalAlpha=blink?0.35:1;  // 스프라이트 그리기 전 알파 확실히
  const sp=PL.ground&&Math.abs(PL.vx)>.5?(PL.wf<2?D_RUN1:D_RUN2):D_JMP;
  spr(sp,ppx,ppy);
  cx.globalAlpha=1;
}

function drawHUD(){
  // 하트 - maxHearts에 맞게 배경 넓이 동적 조정
  const heartBgW=14+maxHearts*34-14+20;
  fillR(8,8,heartBgW,34,'rgba(0,0,0,.5)');
  const totalSlots=maxHearts;
  for(let i=0;i<totalSlots;i++){
    const v=hearts-i,hx=14+i*34;
    [[4,0,8,3],[2,3,12,3],[0,6,16,3],[0,9,16,3],[2,12,12,3],[4,15,8,3],[6,18,4,3]].forEach(([ox,oy,w2,h2])=>{
      cx.fillStyle=v>=1?'#FF3850':v>=.5?(ox<8?'#FF3850':'#444'):'#333';
      cx.fillRect(hx+ox,14+oy,w2,h2);
    });
  }

  // 점수
  fillR(W-218,8,110,34,'rgba(0,0,0,.5)');
  cx.fillStyle='#FFD700';cx.font='bold 14px Courier New';cx.textAlign='right';
  cx.fillText(String(score).padStart(6,'0'),W-114,30);

  // PAUSE 버튼
  const pb=pauseBtnRect;
  fillR(pb.x,pb.y,pb.w,pb.h,'rgba(0,0,0,0.72)');
  cx.strokeStyle='#FFD700';cx.lineWidth=2;cx.strokeRect(pb.x,pb.y,pb.w,pb.h);
  cx.fillStyle='#FFD700';cx.font='bold 15px Courier New';cx.textAlign='center';
  cx.fillText('❚❚',pb.x+pb.w/2,pb.y+17);
  cx.fillStyle='rgba(255,215,0,0.75)';cx.font='bold 9px Courier New';
  cx.fillText('PAUSE',pb.x+pb.w/2,pb.y+30);

  // 가방 아이콘 (획득 후)
  if(hasBag){
    fillR(W-218,46,60,26,'rgba(0,0,0,.5)');
    cx.font='14px serif';cx.textAlign='left';cx.fillText('🎒',W-216,66);
    cx.fillStyle='#aaa';cx.font='9px Courier New';cx.textAlign='left';
    cx.fillText(`B키`,W-198,66);
    if(inventory.lifePotion>0){
      cx.fillText('🧪'+inventory.lifePotion,W-180,66);
    }
  }

  // 무적 표시
  if(hasInvincible){
    fillR(W/2-64,8,128,28,'rgba(0,0,0,.6)');
    cx.fillStyle='#ffd700';cx.font='bold 11px Courier New';cx.textAlign='center';
    cx.fillText(`🛡 무적 ${Math.ceil(invincibleTimer/60)}초`,W/2,27);
  }
  // 느려짐 표시
  if(manholeSlowTimer>0){
    const bar=manholeSlowTimer/60;
    fillR(PL.x-cam,PL.y-8,Math.round(36*bar),4,'#4488ff');
  }

  // 인벤토리 패널
  // 인벤토리는 OV 패널로 처리

  // 진행바
  const prog=Math.min(PL.x/WORLD,1);
  fillR(8,H-18,W-16,10,'rgba(0,0,0,.5)');
  fillR(8,H-18,(W-16)*prog,10,'#FFD700');

  // 팝업
  popups.forEach(p=>{
    cx.globalAlpha=Math.min(1,p.life/20);
    cx.fillStyle=p.c;cx.font='bold 12px Courier New';cx.textAlign='center';
    cx.fillText(p.t,p.x-cam+18,p.y-6);cx.globalAlpha=1;
  });

  // 모바일 버튼
  drawMobileButtons();
}

function drawMobileButtons(){
  if(gs!=='playing'&&gs!=='paused')return;
  [[MB.left,'◀',mobileKeys.left,'#ffd700'],[MB.right,'▶',mobileKeys.right,'#ffd700'],[MB.jump,'▲',mobileKeys.jump,'#69f0ae']].forEach(([btn,label,active,col])=>{
    cx.globalAlpha=active?0.75:0.40;
    fillR(btn.x,btn.y,btn.w,btn.h,'#000');
    cx.strokeStyle=col;cx.lineWidth=2;cx.strokeRect(btn.x,btn.y,btn.w,btn.h);
    cx.fillStyle=col;cx.font=`bold ${btn===MB.jump?26:24}px sans-serif`;cx.textAlign='center';
    cx.fillText(label,btn.x+btn.w/2,btn.y+btn.h/2+9);
    if(btn===MB.jump){cx.font='bold 9px Courier New';cx.fillStyle='rgba(105,240,174,0.8)';cx.fillText('JUMP',btn.x+btn.w/2,btn.y+btn.h-5);}
    cx.globalAlpha=1;
  });
}

function drawTitle(){
  drawBG();
  fillR(0,0,W,H,'rgba(0,0,0,.55)');
  fillR(W/2-210,95,420,215,'#0e0e1e');
  cx.strokeStyle='#ffd700';cx.lineWidth=3;cx.strokeRect(W/2-210,95,420,215);
  cx.fillStyle='#FFD700';cx.font='bold 26px Courier New';cx.textAlign='center';
  cx.fillText('🐾 조백호의 여행',W/2,138);
  cx.fillStyle='#82b1ff';cx.font='16px Courier New';cx.fillText('2장: 시내 탐험',W/2,166);
  cx.fillStyle='#aaa';cx.font='11px Courier New';
  cx.fillText('🕳️ 맨홀 피하기  🍖 간식 받기',W/2,194);
  cx.fillText('🚦 횡단보도  ☕ 카페  🚕 택시',W/2,214);
  if(Math.floor(frame/22)%2===0){cx.fillStyle='#FFD700';cx.font='bold 12px Courier New';cx.fillText('[ SPACE / 클릭 → 게임 설명 ]',W/2,254);}
  spr(D_RUN1,W/2-18,268);
}

// ── 메인 루프 ─────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  cx.clearRect(0,0,W,H);
  frame++;
  if(gs==='title'){drawTitle();return;}
  if(gs!=='playing'){
    drawBG();drawManholes();drawSnacks();drawNPCs();drawTaxi();drawChiwaFriend();drawPlayer();drawHUD();return;
  }
  update();
  checkDollyMission();
  // 택시 이동 업데이트
  updateTaxi();
  drawBG();drawManholes();drawSnacks();drawNPCs();drawTaxi();drawChiwaFriend();drawPlayer();drawHUD();
}

OV.style.display='none';gs='title';loop();
</script>
